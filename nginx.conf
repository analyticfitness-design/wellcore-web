upstream php {
    server 127.0.0.1:9000;
    keepalive 16;
}

# Rate limiting: auth endpoints max 10 req/min por IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
# Rate limiting: API general max 120 req/min por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html index.php;

    # No revelar version de nginx
    server_tokens off;

    client_max_body_size 10M;

    # Custom error pages
    error_page 404 /404.html;
    error_page 403 /404.html;
    error_page 500 502 503 504 /404.html;

    # ── Security headers globales ──────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "DENY"                           always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                   always;

    # Content-Security-Policy para HTML publico
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://kit.fontawesome.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://ka-f.fontawesome.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Bloquear archivos ocultos (.git, .env, etc.) ──────────
    location ~ /\. {
        return 404;
    }

    # ── Bloquear archivos sensibles en raiz ───────────────────
    location ~* \.(sql|env|log|sh|bak|ini|conf|yml|yaml|json|md|txt|docx)$ {
        # Excepciones: robots.txt, sitemap.xml, manifest.json permitidos
        return 404;
    }
    location = /robots.txt  { allow all; }
    location = /sitemap.xml { allow all; }

    # ── Bloquear archivos PHP de utilidad en raiz ─────────────
    location ~ ^/(create-test-users|router|coach-profile|diagnostic)\.php$ {
        return 404;
    }

    # ── Bloquear /api/setup/ completamente desde internet ─────
    # Solo accesible via CLI (php en container) o SSH interno
    location ^~ /api/setup/ {
        return 404;
    }

    # ── Bloquear /logs/ y /test/ ──────────────────────────────
    location ^~ /logs/ { return 404; }
    location ^~ /test/ { return 404; }
    location ^~ /docs/ { return 404; }

    # ── diagnostic.html — bloquear ────────────────────────────
    location = /diagnostic.html { return 404; }

    # ── Uploads: solo archivos estaticos, SIN ejecutar PHP ────
    location ^~ /uploads/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "inline";
        # Denegar explicitamente cualquier .php dentro de uploads
        location ~* \.php$ { return 404; }
        try_files $uri =404;
    }

    # ── API auth: rate limiting estricto ──────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ $uri.php =404;
        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_keep_conn on;
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 30s;
            fastcgi_read_timeout 30s;
            fastcgi_buffering on;
            fastcgi_buffer_size 64k;
            fastcgi_buffers 4 128k;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTP_HOST $host;
        }
    }

    # ── API general ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ $uri.php =404;
        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_keep_conn on;
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
            fastcgi_buffering on;
            fastcgi_buffer_size 64k;
            fastcgi_buffers 4 128k;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTP_HOST $host;
        }
    }

    # ── Contenido estatico con cache ──────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Paginas HTML ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
