<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0f0f12"/>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#E31E24" stroke-width="1.5" opacity="0.3"/>
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="rgba(227,30,36,0.1)" stroke-width="1"/>
  <!-- Book icon area -->
  <rect x="120" y="80" width="160" height="200" rx="4" fill="#1a0002" stroke="#E31E24" stroke-width="1.5"/>
  <rect x="130" y="90" width="140" height="180" rx="2" fill="#111"/>
  <!-- Lines -->
  <line x1="145" y1="130" x2="260" y2="130" stroke="#E31E24" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="150" x2="240" y2="150" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="145" y1="165" x2="255" y2="165" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="145" y1="180" x2="230" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="145" y1="195" x2="250" y2="195" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="145" y1="210" x2="235" y2="210" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="145" y1="225" x2="248" y2="225" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- WC mark on book -->
  <text x="200" y="118" font-family="monospace" font-size="11" fill="#E31E24" text-anchor="middle" letter-spacing="3" font-weight="bold">WELLCORE</text>
  <!-- Text below -->
  <text x="200" y="320" font-family="monospace" font-size="14" fill="#E31E24" text-anchor="middle" letter-spacing="3" font-weight="bold">GUÍA DE NUTRICIÓN</text>
  <text x="200" y="342" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">85 PÁGINAS — PDF DIGITAL</text>
  <text x="200" y="360" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1">DESCARGA INMEDIATA</text>
</svg>
