    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1000" cy="300" r="350" fill="#E31E24" opacity="0.07" filter="url(#blur)"/>
