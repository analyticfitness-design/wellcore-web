<VirtualHost *:80>
    ServerName _
    DocumentRoot /var/www/html
    DirectoryIndex index.html index.php

    <Directory /var/www/html>
        Options -Indexes -MultiViews
        AllowOverride None
        Require all granted

        # Rewrite: sirve /pagina como /pagina.html si existe
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}.html -f
        RewriteRule ^(.+)$ $1.html [L]
    </Directory>

    # /api/ — PHP activo, extensionless endpoints, Bearer token
    <Directory /var/www/html/api>
        Options -Indexes
        AllowOverride None
        Require all granted

        # Pasar Authorization header a PHP (necesario para Bearer tokens)
        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

        # Rewrite: /api/clients/profile → /api/clients/profile.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}.php -f
        RewriteRule ^(.+)$ $1.php [L]
    </Directory>

    # Bloquear archivos ocultos (.env, .git, etc.)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Bloquear /logs/ y /test/
    <Location /logs/>
        Require all denied
    </Location>
    <Location /test/>
        Require all denied
    </Location>

    # ── Security Headers (2026 best practices) ──
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-XSS-Protection "0"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://wellcorefitness.com https://formspree.io https://api.openai.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io https://checkout.payu.com"

    # Block access to sensitive API data directory
    <Directory /var/www/html/api/data>
        Require all denied
    </Directory>

    # Cache de estáticos 30 días
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </FilesMatch>

    # No cache for HTML pages
    <FilesMatch "\.(html|php)$">
        Header set Cache-Control "no-store, no-cache, must-revalidate, private"
    </FilesMatch>

    # Custom error pages
    ErrorDocument 404 /404.html
    ErrorDocument 403 /404.html
    ErrorDocument 500 /404.html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
